name: Deploy Backend to EC2

on:
  push:
    branches: [ main ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/kevin-backend
            git pull origin main
            npm install
            npm run build
            pm2 restart kevin-backend || pm2 start dist/server.js --name "kevin-backend"